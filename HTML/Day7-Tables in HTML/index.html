<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tables in HTML</title>
  </head>
  <body>
    <h1>Tables in HTML</h1>
    <table border>
      <caption>
        User Data
      </caption>

      <thead>
        <tr>
          <th>Sl. No.</th>
          <th>Name</th>
          <th>Age</th>
          <th>Profession</th>
          <th>Salary</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>1</td>
          <td>Sundari</td>
          <td>24</td>
          <td>Developer</td>
          <td>50,000/M.</td>
        </tr>

        <tr>
          <td>2</td>
          <td>Denith</td>
          <td>22</td>
          <td>Developer</td>
          <td>40,000/M.</td>
        </tr>

        <tr>
          <td>3</td>
          <td>Krishn</td>
          <td>23</td>
          <td>Testing Eng.</td>
          <td>20,000/M.</td>
        </tr>

        <tr>
          <td>4</td>
          <td>Dhana</td>
          <td>23</td>
          <td>Developer</td>
          <td>60,000/M.</td>
        </tr>
      </tbody>

      <tfoot>
        <tr>
          <td colspan="4">Total Users</td>
          <td>4</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
