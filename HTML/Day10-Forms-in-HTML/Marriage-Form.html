<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matrimonial Form</title>
  </head>
  <body>
    <h1>Marriage Form</h1>
    <form action="">
      <label for="full-name">Full Name: </label>
      <input
        type="text"
        placeholder="Enter your Name"
        name="full-name"
        id="full-name"
      />
      <br /><br />
      <label for="age">Enter Age: </label>
      <input type="number" placeholder="Enter your age" name="age" id="age" />

      <br /><br />

      <label for="salary">Salary:</label>
      <input
        type="number"
        placeholder="Enter your CTC."
        name="salary"
        id="salary"
      />

      <br /><br />
      <label for="">Gender: </label>
      <input type="radio" id="male" name="gender" value="male" />
      <label for="male">Male</label>
      <input type="radio" id="female" name="gender" value="female" />
      <label for="female">Female</label>
      <input type="radio" id="others" name="gender" value="others" />
      <label for="others">Others</label>

      <br /><br />
      <label for="height">Mention Height in cm</label>
      <input
        type="number"
        placeholder="Enter your height"
        name="height"
        id="height"
      />

      <br /><br />
      <label for="resume">Upload your resume</label>
      <input type="file" name="resume" id="resume" />

      <br /><br />
      <label for="img">Upload your image:</label>
      <input type="file" name="img" id="img" />

      <br /><br />
      <!-- datalist as an homework -->
      <label for="country">Select Country</label>
      <select name="country" id="country">
        <option value=""></option>
        <option value="India">India</option>
        <option value="America">America</option>
        <option value="Russia">Russia</option>
        <option value="Thailand">Thailand</option>
        <option value="Japan">Japan</option>
        <option value="ukraine">ukraine</option>
      </select>

      <br /><br />
      <label for="hobbies">Select your hobbies</label>
      <input type="checkbox" id="cricket" value="cricket" name="hobbies" />
      <label for="cricket">Cricket</label>
      <input type="checkbox" id="football" value="football" name="hobbies" />
      <label for="football">football</label>

      <br /><br />
      <label for="">Religion</label>
      <input type="radio" name="religion" id="hinduism" value="hinduism" />
      <label for="hinduism">hinduism</label>
      <input type="radio" name="religion" id="islamic" value="islamic" />
      <label for="islamic">islamic</label>
      <input type="radio" name="religion" id="christian" value="christian" />
      <label for="christian">christian</label>
      <input type="radio" name="religion" id="jainism" value="jainism" />
      <label for="jainism">jainism</label>
      <input type="radio" name="religion" id="buddhism" value="buddhism" />
      <label for="buddhism">buddhism</label>

      <br /><br />
      <label for="status">Status:</label>
      <select name="status" id="status">
        <option value="Married">Married</option>
        <option value="Unmarried">Unmarried</option>
        <option value="Divorced">Divorced</option>
      </select>

      <br /><br />
      <label for="profession">Profession</label>
      <input
        type="text"
        placeholder="Enter Profession"
        name="profession"
        id="profession"
      />

      <br /><br />
      <label for="qualification">Highest Qualification:</label>
      <select name="qualification" id="qualification">
        <option value="UnderGraduate">UnderGraduate</option>
        <option value="PostGraduate">PostGraduate</option>
        <option value="Masters">Masters</option>
        <option value="Ph.d">Ph.d</option>
      </select>

      <br /><br />
      <label for="contact">Enter Contact:</label>
      <input
        type="tel"
        placeholder="Enter your phone no."
        name="contact"
        id="contact"
      />

      <br /><br />
      <label for="mailid">Enter your email</label>
      <input
        type="email"
        placeholder="Enter your mail id"
        name="mailid"
        id="mailid"
      />

      <br /><br />
      <fieldset>
        <legend>Address</legend>
        <label for="house">House Number</label>
        <input
          type="number"
          placeholder="Enter your house number"
          name="house-number"
          id="house"
        />
        <label for="street">Street Name</label>
        <input
          type="text"
          placeholder="Enter street name"
          name="street"
          id="street"
        />
        <br /><br />
        <label for="area">Area</label>
        <input type="text" placeholder="Area name" name="area" id="area" />

        <label for="locality">Locality</label>
        <input
          type="text"
          placeholder="Enter locality"
          name="locality"
          id="locality"
        />

        <br /><br />

        <label for="city">City name</label>
        <select name="city" id="city">
          <option value="thanjavur">thanjavur</option>
          <option value="Chennai">Chennai</option>
          <option value="Trichy">Trichy></option>
          <option value="Vellore">Vellore</option>
          <option value="Chengalpattu">Chengalpattu</option>
          <option value="Kanyakumari">Kanyakumari</option>
          <option value="Ooty">Ooty</option>
          <option value="pondicherry">pondicherry</option>
        </select>
      </fieldset>

      <br /><br />
      <label for="insta-url">Paste the insta id:</label>
      <input
        type="url"
        placeholder="enter your insta url"
        name="insta-url"
        id="insta-url"
      />

      <br /><br />
      <label for="aadhaar">Enter Aadhaar Number</label>
      <input
        type="text"
        placeholder="Enter Aadhaar number"
        name="aadhaar-number"
        id="aadhaar"
      />

      <br /><br />
      <label for="medCertificate">Upload medical Certificate</label>
      <input type="file" name="medCertificate" id="medCertificate" />

      <button>Submit</button>
    </form>
  </body>
</html>
