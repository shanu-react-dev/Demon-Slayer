<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Tags</title>
  </head>
  <body>
    <h1>Media tags in HTM</h1>
    <img
      src="https://cdn.pixabay.com/photo/2025/01/21/14/59/woman-9349699_1280.jpg"
      alt="red woman"
      height="200px"
      width="250px"
    />

    <img
      src="./Revolutionizing_Space_Tech_Desktop_ec67ad03c2.jpg"
      alt="rocket"
      height="200px"
      width="270px"
    />

    <audio
      src="./Unakkul Naane - RaagTune.mp3"
      controls
      autoplay
      muted
      loop
    ></audio>

    <video
      src="./first.mp4"
      controls
      height="500px"
      width="300px"
      autoplay
      muted
      loop
    ></video>

    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d299.87095047357957!2d80.14156682145946!3d12.95853831154999!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a525e4ca559c68f%3A0x1e3e6d4bcd550206!2sQSpiders%20Chennai%20Chromepet!5e0!3m2!1sen!2sin!4v1776845135646!5m2!1sen!2sin"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
      height="200px"
      width="300px"
    ></iframe>

    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/zpmRmUr-Xng?si=gYbhxkThkaPwupmf"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
  </body>
</html>
