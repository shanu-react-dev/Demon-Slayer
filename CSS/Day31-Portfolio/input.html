<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .inputBox {
        width: 50%;
        height: auto;
        position: relative;
        /* border: 2px solid red; */
      }
      .inputBox > input {
        width: 100%;
        padding: 20px 30px;
        font-size: 17px;
        border: 2px solid blue;
        outline: none;
        border-radius: 30px;
        transition: 1s;
        font-weight: 600;
      }
      .inputBox > label {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        left: 30px;
        background-color: #fff;
        transition: 1s;
        font-weight: 900;
        color: grey;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .inputBox > input:focus + label,
      input:valid + label {
        top: -1px;
      }
      input:focus {
        box-shadow: 2px 2px 10px lightblue;
      }
    </style>
  </head>
  <body>
    <div class="inputBox">
      <input type="text" required />
      <label for="">Username</label>
    </div>
  </body>
</html>
