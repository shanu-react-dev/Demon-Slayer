<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />

    <!-- Basic Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css"
      rel="stylesheet"
    />
    <!-- Filled Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css"
      rel="stylesheet"
    />
    <!-- Brand Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <h2>Login Here</h2>

      <form>
        <div class="usernameBox">
          <label for="username">Enter Username</label>
          <div class="inputBox">
            <input
              type="text"
              placeholder="Enter Username"
              name="username"
              id="username"
            />
            <i class="bx bx-user"></i>
          </div>
        </div>

        <div class="passwordBox">
          <label for="password">Enter Password</label>
          <div class="inputBox">
            <input
              type="password"
              placeholder="Enter password"
              name="password"
              id="password"
            />
            <i class="bx bx-lock"></i>
          </div>
        </div>

        <input type="submit" value="Login Here" />
        <a href="#">Forgot Password</a>
      </form>
    </main>
  </body>
</html>
