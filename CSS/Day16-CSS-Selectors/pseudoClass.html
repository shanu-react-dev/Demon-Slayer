<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      button {
        color: blue;
        background-color: lightblue;
      }

      button:hover {
        background-color: black;
        color: red;
      }

      [type] {
        color: blue;
      }

      [type]:hover {
        color: green;
      }

      [type]:focus {
        color: coral;
      }

      h1:focus {
        color: blueviolet;
      }

      input:active {
        background-color: aquamarine;
      }

      a {
        color: lightseagreen;
      }
      a:active {
        color: crimson;
      }
      a:visited {
        color: darkmagenta;
      }
      h1:active {
        color: darkcyan;
      }

      li:first-child {
        color: blue;
        font-size: x-large;
      }

      li:last-child {
        color: crimson;
        background-color: black;
      }

      li:nth-child(6) {
        color: coral;
      }

      li:nth-child(odd) {
        color: darksalmon;
      }
      li:nth-child(even) {
        color: darkslateblue;
      }

      input:valid {
        background-color: green;
      }
      input:invalid {
        background-color: red;
      }
    </style>
  </head>
  <body>
    <h1>Pseudo Class Selector</h1>

    <form>
      <input type="text" placeholder="Enter username" minlength="8" required />
      <button type="submit">Submit</button>
    </form>
    <button>Hii I am a button</button>

    <a href="https://www.github.com">Visit Github</a>
    <a href="https://www.netflix.com">Visit Netflix</a>

    <ol>
      <li>Ishan Kishan</li>
      <li>Pat Cummins</li>
      <li>MS Dhoni</li>
      <li>Virat Kohli</li>
      <li>Rohit Sharma</li>
      <li>Shreyas Iyer</li>
      <li>KL Rahul</li>
      <li>Vaibhav Sooryavanshi</li>
      <li>T. Natrajan</li>
      <li>Hardik Pandya</li>
      <li>SKY</li>
      <li>Gaikwad</li>
    </ol>
  </body>
</html>
